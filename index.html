<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dodo | Official Bio</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f0f0f, #252525);
      --card-color: rgba(255, 255, 255, 0.05);
      --text-color: #ffffff;
      --subtext-color: #b0b0b0;
      --accent-color: #007aff;
      --button-bg: rgba(255, 255, 255, 0.1);
      --button-hover: rgba(255, 255, 255, 0.2);
    }

    [data-theme="light"] {
      --bg-gradient: linear-gradient(135deg, #e0e0e0, #ffffff);
      --card-color: rgba(0, 0, 0, 0.05);
      --text-color: #1a1a1a;
      --subtext-color: #666;
      --accent-color: #0056b3;
      --button-bg: rgba(0, 0, 0, 0.05);
      --button-hover: rgba(0, 0, 0, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none; /* Mencegah seleksi teks */
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s ease;
      overflow: hidden;
    }

    .container {
      background: var(--card-color);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
      position: relative;
      animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    img.profile {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent-color);
      padding: 5px;
      margin-bottom: 15px;
      transition: transform 0.3s ease;
    }

    img.profile:hover { transform: scale(1.05); }

    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .role { color: var(--accent-color); font-weight: 500; font-size: 14px; margin-bottom: 8px; }

    .typing-text {
      font-size: 14px;
      color: var(--subtext-color);
      min-height: 20px;
      margin-bottom: 25px;
    }

    .links-wrapper { display: flex; flex-direction: column; gap: 12px; }

    .bio-link {
      background: var(--button-bg);
      padding: 14px;
      border-radius: 14px;
      color: var(--text-color);
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .bio-link:hover {
      background: var(--button-hover);
      transform: scale(1.02);
      border-color: var(--accent-color);
    }

    .music-btn {
      margin-top: 25px;
      background: var(--accent-color);
      color: white;
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      box-shadow: 0 5px 15px rgba(0, 122, 255, 0.3);
    }

    .time { font-size: 12px; margin-top: 15px; opacity: 0.6; font-family: monospace; }

    .toggle-theme {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
    }

    footer { margin-top: 30px; font-size: 11px; color: var(--subtext-color); letter-spacing: 1px; }
  </style>
</head>
<body data-theme="dark">

  <div class="container">
    <button class="toggle-theme" onclick="toggleTheme()">🌓</button>

    <img src="https://files.catbox.moe/o387vs.jpg" alt="Dodo" class="profile" />
    <h1>Dodo</h1>
    <p class="role">Dodo Cihuyyy</p>
    <div class="typing-text" id="typing"></div>

    <div class="links-wrapper">
      <a class="bio-link" href="https://wa.me/6288212461534" target="_blank">WhatsApp Personal</a>
      <a class="bio-link" href="https://www.instagram.com/always.ido" target="_blank">Instagram</a>
      <a class="bio-link" href="https://tiktok.com/@alwys.dodo" target="_blank">TikTok</a>
      <a class="bio-link" href="https://whatsapp.com/channel/0029VbALF9uB4hdLg0QlSV2M" target="_blank">Channel Info 1</a>
      <a class="bio-link" href="https://t.me/dodoirused" target="_blank">Telegram</a>
    </div>

    <button class="music-btn" onclick="toggleMusic()">▶</button>
    <div class="time" id="time"></div>

    <footer>&copy; 2024 DODO SYSTEM • SECURED</footer>
  </div>

  <audio id="bg-music" loop>
    <source src="https://files.catbox.moe/lvhshq.mp3" type="audio/mpeg">
  </audio>

  <script>
    // --- Proteksi Anti-Bobol Dasar ---
    document.addEventListener('contextmenu', e => e.preventDefault()); // Matikan Klik Kanan
    document.onkeydown = function(e) {
      if (e.keyCode == 123 || // F12
          (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) || // Ctrl+Shift+I
          (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) || // Ctrl+Shift+C
          (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) || // Ctrl+Shift+J
          (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) { // Ctrl+U
        return false;
      }
    };

    // --- Kontrol Musik ---
    const audio = document.getElementById("bg-music");
    const playBtn = document.querySelector(".music-btn");
    function toggleMusic() {
      if (audio.paused) {
        audio.play();
        playBtn.textContent = "⏸";
      } else {
        audio.pause();
        playBtn.textContent = "▶";
      }
    }

    // --- Efek Mengetik ---
    const typing = document.getElementById("typing");
    const texts = ["Partner Chandz...", "Ready Bot & Panel", "Join channel info ya!"];
    let tIdx = 0, cIdx = 0, isDel = false;

    function type() {
      const full = texts[tIdx];
      typing.innerHTML = isDel ? full.substring(0, cIdx--) : full.substring(0, cIdx++);
      
      let speed = isDel ? 50 : 100;
      if (!isDel && cIdx === full.length + 1) { isDel = true; speed = 2000; }
      else if (isDel && cIdx === 0) { isDel = false; tIdx = (tIdx + 1) % texts.length; speed = 500; }
      
      setTimeout(type, speed);
    }
    type();

    // --- Jam & Tema ---
    function updateTime() {
      document.getElementById("time").textContent = new Date().toLocaleTimeString("id-ID");
    }
    setInterval(updateTime, 1000);

    function toggleTheme() {
      const body = document.body;
      body.setAttribute("data-theme", body.getAttribute("data-theme") === "dark" ? "light" : "dark");
    }
  </script>
</body>
</html>
